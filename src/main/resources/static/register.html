<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SOA Lab — Register</title>
    <link rel="stylesheet" href="/js/styles.css"/>
</head>
<body>
    <div class="card">
        <div class="badge">SOA Lab 07</div>
        <h1>Create account</h1>
        <p class="subtitle">Gateway → SOAP Auth → stores user → returns JWT</p>

        <div id="err" class="alert error"></div>
        <div id="ok"  class="alert success"></div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="alice"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="alice@example.com"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••"/>
        </div>

        <button class="btn btn-primary" id="regBtn" onclick="register()">Create account</button>

        <div class="link-row">
            Already have an account? <a href="/index.html">Sign in</a>
        </div>

        <hr class="divider"/>
        <div style="font-size:0.75rem;color:#9ca3af">
            <strong>Endpoint:</strong> POST http://localhost:8082/auth/register<br/>
            <strong>Routed to:</strong> SOAP Auth :8080 → BCrypt password → returns JWT
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });

        async function register() {
            Api.hideError('err');
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('regBtn');

            if (!username || !email || !password) {
                Api.showError('err', 'Please fill in all fields.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating…';

            const res = await Api.register(username, email, password);

            btn.disabled = false;
            btn.textContent = 'Create account';

            if (res && res.ok) {
                Api.showSuccess('ok', 'Account created — redirecting…');
                setTimeout(() => window.location.href = '/profile.html', 800);
            } else {
                Api.showError('err', (res && res.message) || 'Registration failed.');
            }
        }
    </script>
</body>
</html>
